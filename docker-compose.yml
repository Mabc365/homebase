version: '3.8'

services:
  server:
    build: ./server
    container_name: homebase-server
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./server/homebase.db:/app/homebase.db
      - .:/workspace/homebase
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - CLIENT_URL=${CLIENT_URL}
      - HOMEBASE_UPDATE_CWD=${HOMEBASE_UPDATE_CWD}
      - HOMEBASE_UPDATE_COMMAND=${HOMEBASE_UPDATE_COMMAND}
      - NAS_AGENT_URL=${NAS_AGENT_URL:-http://host.docker.internal:3015}
      - NAS_AGENT_TOKEN=${NAS_AGENT_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homebase-network

  client:
    build: ./client
    container_name: homebase-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - homebase-network

networks:
  homebase-network:
    driver: bridge
